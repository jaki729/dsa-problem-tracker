name: Build & Vet

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o dsa-sheet .

      - name: Smoke test
        run: |
          DATA_DIR=/tmp PORT=8099 ./dsa-sheet &
          sleep 1
          curl -sf http://localhost:8099/api/problems | grep -q '"topic"'
          curl -sf http://localhost:8099/healthz